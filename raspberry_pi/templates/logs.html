<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Logs - Packaging Machine</title>
    <style>
	* { margin: 0; padding: 0; box-sizing: border-box; }
	
	body {
	    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
	    background: #1d1d1f;
	    color: #f5f5f7;
	    height: 100vh;
	    display: flex;
	    flex-direction: column;
	}

	header {
	    background: #000;
	    padding: 16px 24px;
	    display: flex;
	    justify-content: space-between;
	    align-items: center;
	    border-bottom: 1px solid #2c2c2e;
	}

	header h1 {
	    font-size: 20px;
	    font-weight: 600;
	}

	nav { display: flex; gap: 20px }
	nav a { color: #f5f5f7; text-decoration: none; font-size: 14px; opacity: 0.8; }
	nav a:hover { opacity: 1; }

	.controls {
	    background: #2c2c2e;
	    padding: 12px 24px;
	    display: flex;
	    gap: 12px;
	    align-items: center;
	    border-bottom: 1px solid #48484a;
	}

	.controls label {
	    font-size: 13px;
	    color: #86868b;
	}

	.controls button {
	    background: #007aff;
	    color: white;
	    border: none;
	    padding: 6px 16px;
	    border-radius: 6px;
	    font-size: 13px;
	    cursor: pointer;
	}

	.controls button:hover {
	     background: #0051d5;
	}

	#logs-container {
	     flex: 1;
	     overflow-y: auto;
	     padding: 16px 24px;
	     font-family: 'SF Mono', Monaco, Consolas, monospace;
	     font-size: 13px;
	     line-height: 16px;
	}

	.log-line {
	      margin: 2px 0;
	      padding: 4px 8px;
	      border-radius: 3px;
	      transition: background 0.2s;
	}

	.log-line.new {
	       background: rgba(52, 199, 89, 0.1);
	       animation: fadeIn 0.3s;
	}

	@keyframes fadeIn {
		from { background: rgba(52, 199, 89, 0.3); }
		to { background: rgba(52, 199, 89, 0.1); }
	}

	.log-line.hidden {
		display: none;
	}

	.timestamp {
		color: #86868b;
	}

	.tag {
		padding: 2px 6px;
		border-radius: 3px;
		font-weight: 500;
		font-size: 11px;
	}

	.tag.SPI { background: #007aff; color: white; }
	.tag.LoadCell { background: #34c759; color: white; }
	.tag.Thermo { background: #ff9500; color: white; }
	.tag.MLX90614 { background: #af52de; color: white; }
	.tag.ALERT { background: #ff3b30; color: white; }
	.tag.System { background: #86868b; color: white; }

	#connection-indicator {
		width: 8px;
		height: 8px;
		border-radius: 50%;
		background: #34c759;
		display: inline-block;
		margin-left: 8px;
	}

	#connection-indicator.disconnected {
		background: #ff3b30;
	}

	.stats {
		padding: 8px 24px;
		background: #2c2c2e;
		border-top: 1px solid #48484a;
		font-size: 12px;
		color: #86868b;
		display: flex;
		gap: 20px;
	}
    }
    </style>
</head>
<body>
    <header>
	<h1>
	   System Logs
	   <span id="connection-indicator"></span>
	</h1>
	<nav>
	    <a href="/">Dashboard</a>
	    <a href="/calibrate">Calibration</a>
	    <a href="/logs">Logs</a>
	</nav>
    </header>

    <div class="controls">
	    <label>Filter:</label>
	    <select id="filter" onchange="applyFilter()">
		 <option value="all">All Tags</option>
		 <option value="ALERT">Alerts Only</option>
		 <option value="SPI">SPI</option>
		 <option value="LoadCell">LoadCell</option>
		 <option value="Thermo">Thermocouple</option>
		 <option value="MLX90614">MLX90614</option>
		 <option value="System">System</option>
	    </select>

	    <label>Search:</label>
	    <input type="text" id="search" placeholder="Search logs..." oninput="applyFilter()">

	    <button onclick="clearLogs()">Clear</button>
	    <button onclick="downloadLogs()">Download</button>

	    <div style="margin-left: auto; color: #86868b; font-size: 12px;">
		    Auto-scroll: <input type="checkbox" id="autoscroll" checked>
	    </div>
    </div>

    <div id="logs-container"></div>

    <div class="stats">
	    <span>Total lines: <strong id="total-lines">0</strong></span>
	    <span>Visible: <strong id="visible-lines">0</strong></span>
	    <span>Alerts: <strong id="alert-count">0</strong></span>
    </div>

    <script>
	    const logsContainer = document.getElementById('logs-container');
	    const filterSelect = document.getElementById('filter');
	    const searchInput = document.getElementById('search');
	    const autoScrollCheckbox = document.getElementById('autoscroll');
	    const connectionIndicator = document.getElementById('connection-indicator');

	    let logs = [];
	    let alertCount = 0;

	    // Live log streaming via Server-Sent Events
	    const eventSource = new EventSource('/stream/logs');

	    eventSource.onopen = function() {
		    connectionIndicator.classList.remove('disconnected');
	    };

	    eventSource.onmessage = function(e) {
		    if (e.data.startsWith(':')) return;  	// Keep alive

		    const logText = e.data;
		    logs.push(logText);

		    // Count alerts
		    if (logText.includes('[ALERT]')) {
			    alertCount++;
			    document.getElementById('alert-count').textContent = alertCount;
		    }

		    // Parse log line
		    const timestampMatch = logText.match(/\[(\d{2}:\d{2}:\d{2})\]/);
		    const tagMatch = logText.match(/\]\s*\[(\w+)\]/);

		    const timestamp = timestampMatch ? timestampMatch[1] : '';
		    const tag = tagMatch ? tagMatch[1] : '';
		    const message = logText.split('] ').slice(2).join('] ');

		    // Create log line element
		    const line = document.createElement('div');
		    line.className = 'log-line new';
		    line.dataset.tag = tag;
		    line.dataset.text = logText.toLowerCase();

		    line.innerHTML = `
			    <span class="timestamp">[${timestamp}]</span>
			    <span class="tag ${tag}">${tag}</span>
			    ${message}
		    `;

		    logsContainer.appendChild(line);

		    // Remove 'new' class after animation
		    setTimeout(() => line.classList.remove('new'), 300);

		    // Auto-scroll if enabled
		    if (autoScrollCheckbox.checked) {
			    logsContainer.scrollTop = logsContainer.scrollHeight;
		    }

		    // Keep max 500 lines
		    if (logs.length > 500) {
			    logs.shift();
			    logsContainer.removeChild(logsContainer.firstChild);
		    }

		    updateStats();
		    applyFilter();
	    };

	    function applyFilter() {
		    const filterValue = filterSelect.value;
		    const searchValue = searchInput.value.toLowerCase();

		    const lines = logsContainer.querySelectorAll('.log-line');
		    let visibleCount = 0;

		    lines.forEach(line => {
			    const tag = line.dataset.tag;
			    const text = line.dataset.text;

			    let show = true;

			    // Tag Filter
			    if (filterValue !== 'all' && tag !== filterValue) {
				    show = false;
			    }

			    // Search filter
			    if (searchValue && !text.includes(searchValue)) {
				    show = false;
			    }

			    line.classList.toggle('hidden', !show);
			    if (show) visibleCount++;
		    });

		    document.getElementById('visible-lines').textContent = visibleCount;
	    }

	    function updateStats() {
		    document.getElementById('total-lines').textContent = logs.length;
		    const visibleCount = logsContainer.querySelectorAll('.log-line:not(.hidden)').length;
		    document.getElementById('visible-lines').textContent = visibleCount;
	    }

	    function clearLogs() {
		    if (confirm('Clear all logs?')) {
			    logsContainer.innerHTML = '';
			    logs = [];
			    alertCount = 0;
			    document.getElementById('alert-count').textContent = 0;
			    updateStats();
		    }
	    }

	    function downloadLogs() {
		    const text = logs.join('\n');
		    const blob = new Blob([text], { type: 'text/plain' });
		    const url = URL.createObjectURL(blob);

		    const a = document.createElement('a');
		    a.href = url;
		    a.download = `machine-logs-${Date.now()}.txt`;
		    a.click();

		    URL.revokeObjectURL(url);
	    }
    </script>
</body>
</html>
